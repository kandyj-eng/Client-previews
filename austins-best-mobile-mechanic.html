<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="format-detection" content="telephone=no"/>
<title>Austin's Best Mobile Mechanic | Master Auto Repair</title>
<meta name="description" content="Master Craftsmanship, Delivered to Your Door. Roberto brings 35 years of expert auto repair experience directly to your driveway."/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #51d0de; 
    --accent-hover: #3ebbc9;
    --bg-white: #FFFFFF; 
    --bg-alt: #F4F8FA; 
    --text-main: #0F172A; 
    --text-gray: #475569; 
    --radius: 16px; 
    --font-head: 'Montserrat', sans-serif;
    --font-body: 'Inter', sans-serif;
    --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.05);
    --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.08);
  }
  html, body { overflow-x: hidden; width: 100%; }
  body { font-family: var(--font-body); background: var(--bg-white); color: var(--text-main); -webkit-font-smoothing: antialiased; }

  a[href^="tel"], a[href^="http"] { color: inherit; text-decoration: none; transition: opacity 0.2s; }
  a:hover { opacity: 0.8; }
  .text-accent-link { color: var(--accent-hover) !important; font-weight: 700; cursor: pointer; text-decoration: none;}

  .fade-in-up { opacity: 0; transform: translateY(30px); transition: opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1); will-change: opacity, transform; }
  .fade-in-up.in-view { opacity: 1; transform: translateY(0); }
  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }

  .promo-banner { background: var(--text-main); color: #FFF; text-align: center; padding: 12px 20px; font-family: var(--font-body); font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; position: relative; z-index: 101; }
  .promo-banner span { color: var(--accent); font-weight: 800; }

  /* DESKTOP NAVIGATION */
  nav {
    background: rgba(255, 255, 255, 0.98); border-bottom: 1px solid #E2E8F0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 80px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-main); cursor: pointer;}
  .nav-logo img { height: 48px; width: auto; border-radius: 6px; }
  .nav-logo-text { font-family: var(--font-head); font-size: 20px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; line-height: 1.1; }
  .nav-logo-text span { color: var(--accent-hover); display: block; font-size: 14px; font-family: var(--font-body); letter-spacing: 2px; margin-top: 2px;}
  
  .nav-links { display: flex; gap: 2.5rem; }
  .nav-links a { font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text-gray); text-decoration: none; cursor: pointer; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent-hover); }
  
  .nav-cta { background: var(--text-main); color: #FFF; font-family: var(--font-body); font-weight: 700; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; border: none; padding: 12px 28px; cursor: pointer; border-radius: 50px; transition: all 0.3s;}
  .nav-cta:hover { background: var(--accent); color: #0F172A; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(81, 208, 222, 0.4); }

  /* MOBILE BOTTOM APP BAR */
  .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(226, 232, 240, 0.6); z-index: 999; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -4px 25px rgba(15, 23, 42, 0.08); }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; color: #94A3B8; text-decoration: none; cursor: pointer; transition: color 0.2s;}
  .mobile-nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }
  .mobile-nav-item span { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;}
  .mobile-nav-item.active { color: var(--accent-hover); }
  .mobile-nav-item.active svg { color: var(--accent-hover); }

  .page { display: none; opacity: 0; transition: opacity 0.4s ease; }
  .page.active { display: block; opacity: 1; }

  .bento-card, .service-big-card, .feature-content, .contact-wrapper, .badge-card { min-width: 0; word-wrap: break-word; }

  /* ─── NEW VIDEO HERO ─── */
  .video-hero {
    position: relative;
    height: 90vh; min-height: 600px; max-height: 900px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scale(1.02);
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, rgba(15, 23, 42, 0.85) 0%, rgba(15, 23, 42, 0.6) 50%, rgba(15, 23, 42, 0.8) 100%);
  }
  .hero-content {
    position: relative; z-index: 2;
    text-align: center;
    padding: 0 5%;
    max-width: 900px;
  }
  .hero-tag { display: inline-block; background: rgba(81, 208, 222, 0.2); color: var(--accent); font-family: var(--font-body); font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; margin-bottom: 1.5rem; border-radius: 50px; border: 1px solid rgba(81, 208, 222, 0.4);}
  .hero h1 { font-family: var(--font-head); font-size: clamp(42px, 6vw, 72px); font-weight: 800; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 1.5rem; color: #FFF; }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero-sub { font-size: 18px; color: rgba(255,255,255,0.85); line-height: 1.7; margin-bottom: 2.5rem; font-weight: 400; max-width: 600px; margin-left: auto; margin-right: auto;}
  
  .hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-primary { background: var(--accent); color: #0F172A; font-family: var(--font-body); font-weight: 700; font-size: 16px; border: none; padding: 18px 40px; cursor: pointer; transition: all 0.3s; border-radius: 50px;}
  .btn-primary:hover { background: #FFF; color: #0F172A; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3); }
  .btn-outline { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: #FFF; font-family: var(--font-body); font-weight: 600; font-size: 16px; border: 1px solid rgba(255,255,255,0.3); padding: 16px 40px; cursor: pointer; transition: all 0.2s; border-radius: 50px;}
  .btn-outline:hover { border-color: #FFF; background: rgba(255,255,255,0.2); }

  .scroll-indicator { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0; animation: fadeIn 1s ease 1.5s forwards; }
  .scroll-indicator span { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  .scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, rgba(255,255,255,0.6), transparent); animation: scrollPulse 2s ease infinite; }
  
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scrollPulse { 0%, 100% { opacity: 0.3; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.3); } }

  /* ─── NEW STATS BAR ─── */
  #stats { background: var(--bg-alt); padding: 40px 5%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; border-bottom: 1px solid #E2E8F0; }
  .stat-item { text-align: center; padding: 20px; border-right: 1px solid #E2E8F0; }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-family: var(--font-head); font-size: 3.2rem; font-weight: 800; color: var(--accent-hover); line-height: 1; margin-bottom: 8px; letter-spacing: -1px;}
  .stat-num span { color: var(--text-main); }
  .stat-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-gray); }

  /* GENERAL SECTIONS */
  .section { padding: 6rem 5%; }
  .section-inner { max-width: 1200px; margin: 0 auto; }
  .section-header { text-align: center; max-width: 700px; margin: 0 auto 4rem auto; }
  .section-label { font-family: var(--font-body); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-hover); margin-bottom: 1rem; display: block; }
  .section-title { font-family: var(--font-head); font-size: clamp(32px, 4vw, 48px); font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 1.5rem; color: var(--text-main); }
  .section-sub { font-size: 18px; color: var(--text-gray); line-height: 1.7; }

  /* BENTO GRIDS */
  .bento-grid { display: grid; gap: 2rem; text-align: left; }
  .bento-card { background: var(--bg-white); padding: 3rem 2.5rem; border-radius: var(--radius); transition: all 0.4s cubic-bezier(0.22,1,0.36,1); box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.02); position: relative; overflow: hidden;}
  .bento-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); z-index: 2;}
  
  .capabilities-bento { grid-template-columns: repeat(4, 1fr); }
  .focus-bento { grid-template-columns: repeat(3, 1fr); }
  
  .bento-feat-img { padding: 0; border: none; box-shadow: none; background: transparent; overflow: hidden;}
  .bento-feat-img.span-2 { grid-column: span 2; }
  .bento-img-asset { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); box-shadow: var(--shadow-md); transition: transform 0.6s ease;}
  .bento-feat-img:hover .bento-img-asset { transform: scale(1.03); }
  
  .service-tag { position: absolute; top: 2rem; right: 2.5rem; background: rgba(81, 208, 222, 0.15); color: var(--accent-hover); font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 12px; border-radius: 50px;}
  .service-icon { background: rgba(81, 208, 222, 0.15); width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: var(--accent-hover); margin-bottom: 2rem; }
